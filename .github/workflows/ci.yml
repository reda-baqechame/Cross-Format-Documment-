name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps (Tesseract for OCR tests)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr tesseract-ocr-eng
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        working-directory: backend
        run: ruff check src tests
      - name: Pytest
        working-directory: backend
        run: pytest -q -m "not stress"
      - name: Stress suite
        working-directory: backend
        run: pytest -q -m stress
      - name: DocumentOpsAgent eval
        run: python evals/document_ops/run_local.py
      - name: Verify migrations apply cleanly with no drift
        working-directory: backend
        env:
          DATABASE_URL: sqlite:////tmp/ci.db
        run: |
          alembic upgrade head
          alembic check

  web:
    name: Web (typecheck + lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from the root package.json "packageManager" field.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        working-directory: apps/web
        run: npx tsc --noEmit
      - name: Lint
        run: pnpm --filter @docos/web lint
      - name: Build
        run: pnpm --filter @docos/web build
      - name: Install Playwright browser
        run: pnpm --filter @docos/web exec playwright install --with-deps chromium
      - name: Browser E2E smoke
        run: pnpm --filter @docos/web test:e2e

  production-smoke:
    name: Production read-only smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, web]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Railway production smoke
        run: pnpm smoke:production
      - name: Railway auth + portal smoke
        run: pnpm smoke:production:auth
