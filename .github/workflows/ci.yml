name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
      - name: Install system deps (Tesseract for OCR tests)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr tesseract-ocr-eng
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        working-directory: backend
        run: ruff check src tests
      - name: Pytest
        working-directory: backend
        run: pytest -q -m "not stress"
      - name: Stress suite
        working-directory: backend
        run: pytest -q -m stress
      - name: DocumentOpsAgent eval
        run: python evals/document_ops/run_local.py
      - name: Document-fidelity eval
        run: python evals/document_fidelity/run_local.py
      - name: Verify migrations apply cleanly with no drift
        working-directory: backend
        env:
          DATABASE_URL: sqlite:////tmp/ci.db
        run: |
          alembic upgrade head
          alembic check

  security:
    name: Security & supply-chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
      - name: Install backend + security tooling
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # Pinned, reproducible security tooling.
          pip install "pip-audit==2.7.3" "cyclonedx-bom==4.6.1" "schemathesis==3.39.16"
      - name: Dependency vulnerability scan (pip-audit)
        working-directory: backend
        # --skip-editable ignores the local 'docos' package (not on PyPI); still fails on any vuln.
        run: pip-audit --skip-editable --desc
      - name: License gate (no forbidden licenses in the closed-SaaS SBOM)
        working-directory: backend
        run: python scripts/check_licenses.py
      - name: Generate SBOM (CycloneDX)
        working-directory: backend
        run: cyclonedx-py environment -o sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: sbom-cyclonedx
          path: backend/sbom.cdx.json
      - name: API fuzzing (Schemathesis, OpenAPI-driven)
        working-directory: backend
        env:
          APP_ENV: dev
          LLM_PROVIDER: noop
          DATABASE_URL: sqlite:////tmp/fuzz.db
        run: |
          alembic upgrade head
          # Provider-gated webhook/callback/translate seams correctly return 501 (Not Implemented)
          # in offline mode; that is a 5xx the not_a_server_error check would flag, so they are
          # excluded here and covered by their own integration tests instead.
          st run --app docos.main:app /openapi.json \
            --experimental=openapi-3.1 \
            --checks not_a_server_error \
            --exclude-path-regex '(webhook|/translate|/integrations/)' \
            --hypothesis-max-examples 12 \
            --hypothesis-deadline 10000

  web:
    name: Web (typecheck + lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # pnpm version comes from the root package.json "packageManager" field.
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        working-directory: apps/web
        run: npx tsc --noEmit
      - name: Lint
        run: pnpm --filter @docos/web lint
      - name: Build
        run: pnpm --filter @docos/web build
      - name: Install Playwright browser
        run: pnpm --filter @docos/web exec playwright install --with-deps chromium
      - name: Browser E2E smoke
        run: pnpm --filter @docos/web test:e2e

  production-smoke:
    name: Production read-only smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, web]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Railway production smoke
        run: pnpm smoke:production
      - name: Railway auth + portal smoke
        run: pnpm smoke:production:auth
