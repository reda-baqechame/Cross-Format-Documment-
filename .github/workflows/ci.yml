name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
      - name: Install system deps (Tesseract for OCR tests)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr tesseract-ocr-eng
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        working-directory: backend
        run: ruff check src tests
      - name: Pytest
        working-directory: backend
        run: pytest -q -m "not stress"
      - name: Stress suite
        working-directory: backend
        run: pytest -q -m stress
      - name: DocumentOpsAgent eval
        run: python evals/document_ops/run_local.py
      - name: Document-fidelity eval
        run: python evals/document_fidelity/run_local.py
      - name: Search retrieval benchmark
        run: python evals/search_retrieval/run_local.py
      - name: Redaction proof (zero recoverable bytes)
        run: python evals/redaction_proof/run_local.py
      - name: Agent-quality eval (offline structural + grounding gates; answer gate runs with a provider)
        run: python evals/agent_quality/run_local.py
      - name: Pack-extraction accuracy (finance/import-export field + finding gates)
        run: python evals/pack_extraction/run_local.py
      - name: PDF edit-fidelity (round-trip + style preserved)
        run: python evals/pdf_fidelity/run_local.py
      - name: Verify migrations apply cleanly with no drift
        working-directory: backend
        env:
          DATABASE_URL: sqlite:////tmp/ci.db
        run: |
          alembic upgrade head
          alembic check

  security:
    name: Security & supply-chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # Security tools run in isolated venvs so they never downgrade the app's own dependencies
      # (e.g. schemathesis pins starlette<1, cyclonedx pulls an older lxml) and thus can't mask
      # or reintroduce vulnerabilities in what actually ships.
      - name: Dependency vulnerability scan (pip-audit)
        working-directory: backend
        run: |
          pip freeze --exclude-editable > /tmp/app-reqs.txt
          python -m venv /tmp/audit
          /tmp/audit/bin/pip install --quiet "pip-audit==2.7.3"
          /tmp/audit/bin/pip-audit -r /tmp/app-reqs.txt --desc
      - name: License gate (no forbidden licenses in the closed-SaaS SBOM)
        working-directory: backend
        run: python scripts/check_licenses.py
      - name: Generate SBOM (CycloneDX)
        run: |
          python -m venv /tmp/sbom
          /tmp/sbom/bin/pip install --quiet "cyclonedx-bom==4.6.1"
          /tmp/sbom/bin/cyclonedx-py environment "$(which python)" -o backend/sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: sbom-cyclonedx
          path: backend/sbom.cdx.json
      - name: API fuzzing (Schemathesis against a live server)
        working-directory: backend
        env:
          APP_ENV: dev
          LLM_PROVIDER: noop
          DATABASE_URL: sqlite:////tmp/fuzz.db
        run: |
          alembic upgrade head
          # The app runs in the job env (real, patched deps); schemathesis runs from its own venv
          # and drives it over HTTP, so its starlette<1 pin can't corrupt what we test.
          uvicorn docos.main:app --port 8077 --log-level warning &
          for i in $(seq 1 30); do curl -sf http://localhost:8077/health >/dev/null && break; sleep 1; done
          python -m venv /tmp/st
          /tmp/st/bin/pip install --quiet "schemathesis==3.39.16"
          # Provider-gated webhook/callback/translate/DRM seams correctly return 501 (Not Implemented)
          # in offline mode; that 5xx would trip not_a_server_error, so they are excluded here and
          # covered by their own integration tests instead.
          /tmp/st/bin/st run http://localhost:8077/openapi.json \
            --experimental=openapi-3.1 \
            --checks not_a_server_error \
            --exclude-path-regex '(webhook|/translate|/integrations/|/drm)' \
            --hypothesis-suppress-health-check filter_too_much \
            --hypothesis-max-examples 12 \
            --hypothesis-deadline 10000

  web:
    name: Web (typecheck + lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # pnpm version comes from the root package.json "packageManager" field.
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        working-directory: apps/web
        run: npx tsc --noEmit
      - name: Lint
        run: pnpm --filter @docos/web lint
      - name: Build
        run: pnpm --filter @docos/web build
      - name: Install Playwright browser
        run: pnpm --filter @docos/web exec playwright install --with-deps chromium
      - name: Browser E2E smoke
        run: pnpm --filter @docos/web test:e2e

  production-smoke:
    name: Production read-only smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend, web]
    env:
      DOCOS_EXPECTED_REVISION: ${{ github.sha }}
      DOCOS_DEPLOY_TIMEOUT_MS: "900000"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Railway production smoke
        run: pnpm smoke:production
      - name: Railway auth + portal smoke
        run: pnpm smoke:production:auth
